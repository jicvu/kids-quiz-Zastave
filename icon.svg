<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <clipPath id="clip">
      <circle cx="256" cy="230" r="145"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Globe base -->
  <circle cx="256" cy="230" r="145" fill="url(#globe)"/>

  <!-- Latitude lines (clipped inside globe) -->
  <g clip-path="url(#clip)" fill="none" stroke="white" stroke-width="3" opacity="0.35">
    <ellipse cx="256" cy="230" rx="145" ry="145"/>
    <line x1="111" y1="230" x2="401" y2="230"/>
    <line x1="118" y1="178" x2="394" y2="178"/>
    <line x1="118" y1="282" x2="394" y2="282"/>
    <line x1="148" y1="128" x2="364" y2="128"/>
    <line x1="148" y1="332" x2="364" y2="332"/>
  </g>

  <!-- Longitude lines (clipped inside globe) -->
  <g clip-path="url(#clip)" fill="none" stroke="white" stroke-width="3" opacity="0.35">
    <ellipse cx="256" cy="230" rx="60" ry="145"/>
    <ellipse cx="256" cy="230" rx="115" ry="145"/>
  </g>

  <!-- Globe border -->
  <circle cx="256" cy="230" r="145" fill="none" stroke="white" stroke-width="5" opacity="0.6"/>

  <!-- Star/sparkle accent -->
  <circle cx="320" cy="160" r="12" fill="white" opacity="0.9"/>
  <circle cx="320" cy="160" r="6" fill="#fbbf24"/>

  <!-- Bottom text area -->
  <rect x="80" y="415" width="352" height="60" rx="20" fill="white" opacity="0.2"/>
  <text x="256" y="458" font-family="Arial, sans-serif" font-size="36" font-weight="900"
        text-anchor="middle" fill="white" letter-spacing="1">ZASTAVE</text>
</svg>

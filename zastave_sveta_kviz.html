    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zastave Sveta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">

    <style>
        body {
            font-family: 'Nunito', 'Varela Round', 'Comic Sans MS', 'Trebuchet MS', sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            min-height: 100vh;
        }

        @keyframes pop {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .animate-pop { animation: pop 0.3s ease-out; }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 100;
            pointer-events: none;
            border-radius: 2px;
            animation: fall 2.5s linear forwards;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .flag-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .timer-container {
            position: relative;
            width: 50px;
            height: 50px;
        }
        .timer-svg {
            transform: rotate(-90deg);
        }
        .timer-circle-bg {
            fill: none;
            stroke: #e2e8f0;
            stroke-width: 4;
        }
        .timer-circle-fg {
            fill: none;
            stroke: #6366f1;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        .continent-btn {
            background: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .continent-btn:hover {
            transform: scale(1.02);
            background: #f8fafc;
            border-color: #cbd5e1;
        }
        .continent-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

            score = 0;

            nextQuestion();

        function playSound(isCorrect) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (isCorrect) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function createConfetti() {
            const colors = ['#6366f1', '#38bdf8', '#fbbf24', '#4ade80', '#f472b6'];
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                conf.style.width = (Math.random() * 8 + 8) + 'px';
                conf.style.height = conf.style.width;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }
        }

        function startTimer() {
            clearInterval(timerId);
            timeLeft = totalTime;
            updateTimerUI();
            timerId = setInterval(() => {
                if (isTransitioning) return;
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerId);
                    handleTimeout();
                }
                updateTimerUI();
            }, 100);
        }

        function updateTimerUI() {
            const bar = document.getElementById('timerBar');
            const text = document.getElementById('timerText');
            const radius = 18;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (timeLeft / totalTime) * circumference;
            bar.style.strokeDashoffset = offset;
            text.innerText = Math.ceil(timeLeft);
            if (timeLeft < 3) {
                bar.style.stroke = "#ef4444";
                text.style.color = "#ef4444";
            } else {
                bar.style.stroke = "#6366f1";
                text.style.color = "#6366f1";
            }
        }

        function handleTimeout() {
            playSound(false);
            streak = 0;
            isTransitioning = true;
            document.getElementById('gameCard').classList.add('animate-shake');
            setTimeout(() => {
                document.getElementById('gameCard').classList.remove('animate-shake');
                nextQuestion();
            }, 1500);
        }

        function updateUI() {
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('streakVal').innerText = streak;
            document.getElementById('langToggle').innerText = lang === 'sr' ? 'EN' : 'SR';
            
            const areaNames = {
                europe: { sr: 'Evrope', en: 'Europe' },
                asia: { sr: 'Azije', en: 'Asia' },
                africa: { sr: 'Afrike', en: 'Africa' },
                northAmerica: { sr: 'Severne Amerike', en: 'N. America' },
                southAmerica: { sr: 'Južne Amerike', en: 'S. America' },
                australia: { sr: 'Australije', en: 'Australia' }
            };

            document.getElementById('mainTitle').innerText = (lang === 'sr' ? 'Zastave ' : 'Flags of ') + areaNames[currentContinent][lang];
            document.getElementById('subTitle').innerText = lang === 'sr' ? 'Pronađi državu:' : 'Find the country:';
            document.getElementById('bravoText').innerText = lang === 'sr' ? 'ODLIČNO!' : 'FANTASTIC!';
            document.getElementById('resetText').innerText = lang === 'sr' ? 'Nazad' : 'Back';
            document.getElementById('chooseText').innerText = lang === 'sr' ? 'Izaberi kontinent:' : 'Choose a continent:';
            
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            options.forEach((country, index) => {
                const btn = document.createElement('button');
                const isWrong = wrongIndices.has(index);
                btn.className = `w-full text-lg sm:text-xl font-black py-4 px-4 rounded-[1.5rem] transition-all duration-200 border-b-4 
                    ${isWrong ? 'bg-slate-100 text-slate-300 border-slate-200 cursor-not-allowed scale-95' 
                              : 'bg-white text-slate-700 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 active:scale-95 shadow-sm'}`;
                btn.innerText = country[lang];
                btn.onclick = () => {
                    if (isTransitioning || isWrong) return;
                    handleSelection(country, index, btn);
                };
                grid.appendChild(btn);
            });
        }

        function handleSelection(country, index, btn) {
            if (country.code === currentFlag.code) {
                isTransitioning = true;
                clearInterval(timerId);
                playSound(true);
                btn.className = "w-full text-lg sm:text-xl font-black py-4 px-4 rounded-[1.5rem] bg-green-500 text-white border-green-700 shadow-lg scale-105 animate-pop";
                if (wrongIndices.size === 0) { score += 10; streak++; }
                document.getElementById('celebration').classList.remove('hidden');
                createConfetti();
                setTimeout(nextQuestion, 2000);
            } else {
                playSound(false);
                streak = 0;
                wrongIndices.add(index);
                document.getElementById('gameCard').classList.add('animate-shake');
                setTimeout(() => document.getElementById('gameCard').classList.remove('animate-shake'), 400);
                updateUI();
            }
        }

        function nextQuestion() {
            const data = flagsDB[currentContinent];
            const shuffled = [...data].sort(() => 0.5 - Math.random());
            options = shuffled.slice(0, 4);
            currentFlag = options[Math.floor(Math.random() * 4)];
            wrongIndices.clear();
            isTransitioning = false;
            const flagImg = document.getElementById('flagImg');
            flagImg.style.opacity = '0';
            flagImg.src = `./flags/${currentFlag.code}.png`;
            flagImg.onload = () => {
                flagImg.style.opacity = '1';
                document.getElementById('celebration').classList.add('hidden');
                updateUI();
                startTimer();
            };
        }

        document.getElementById('langToggle').onclick = () => {
            lang = lang === 'sr' ? 'en' : 'sr';
            updateUI();
        };

        document.getElementById('resetBtn').onclick = () => {
            clearInterval(timerId);
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('selectionScreen').classList.remove('hidden');
        };

        // Register service worker for offline / PWA support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
